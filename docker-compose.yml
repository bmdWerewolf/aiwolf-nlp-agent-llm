# ============================================
# AIWolf NLP - Docker Compose Configuration
# One-click startup for Server + Agent
# ============================================

services:
  # Game Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: aiwolf-server
    ports:
      - "8080:8080"
    volumes:
      # Mount logs to local directory
      - ./server/logs:/app/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 3s
      retries: 3

  # AI Agent
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiwolf-agent
    depends_on:
      server:
        condition: service_healthy
    environment:
      # API Key is read from .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      # Config files mount (changes take effect immediately)
      - ./config:/app/config
      # Logs mount
      - ./log:/app/log
      # [Dev Mode] Source code mount (code changes take effect immediately)
      - ./src:/app/src
    extra_hosts:
      # Allow container to access host machine
      - "host.docker.internal:host-gateway"
    # Default config file, can be overridden via command line
    command: uv run python src/main.py -c ./config/config_opr.yml
