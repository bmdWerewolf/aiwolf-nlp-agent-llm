web_socket:
  url: ws://server:8080/ws
  token:
  auto_reconnect: false

agent:
  num: 5
  team: bmd
  kill_on_timeout: true

llm:
  type: google
  sleep_time: 5

# Chain of Thought (思考の連鎖) 設定
cot:
  enabled: true

# 記憶管理設定
memory:
  type: 0
  rolling_summary:
    buffer_size: 5
  game_state:
    suspicion_decay: 0.1
  belief_reflexion:
    reflexion_interval: 1

openai:
  model: "gemini-2.0-flash-lite"
  temperature: 0.7
  base_url: http://127.0.0.1:8000/v1
  api_key: "dummy"
  max_tokens: 2048

google:
  model: gemini-2.0-flash-lite
  temperature: 0.7

ollama:
  model: qwen2.5:72b
  temperature: 0.7
  base_url: http://127.0.0.1:11434

prompt:
  initialize: |-
    # 1. 基本ルール設定
    あなたは人狼ゲーム（汝は人狼なりや？）のデジタル対戦をプレイしています。

    役職構成:
    - 人狼 1, 狂人 1 (人狼陣営), 占い師 1, 村人 2 (村人陣営)

    ゲームの流れ:
    - 夜: 人狼が襲撃します。占い師は一人を占います。狂人は夜のアクションを持ちません。
    - 昼: プレイヤー全員で議論し、一人を処刑（追放）するために投票します。

    勝利条件:
    - 村人陣営: 人狼を処刑すれば勝利。
    - 人狼陣営: 生存者の半数が人狼陣営になれば勝利。

    ゲーム参加者:
    {% for k, v in info.status_map.items() if v == 'ALIVE'%}
    - {{ k }}
    {% endfor %}

    # 2. あなたのアイデンティティ
    名前: {{ info.agent }}
    役職: {{ role.value }}
    性格・背景: {{ info.profile }}
    出力する語尾や口調は性格を表したものにしてください。

    # 3. 戦略ガイドライン ({{ role.value }})
    {% if role.value == 'WEREWOLF' -%}
    - 村人たちを混乱や疑心暗鬼に陥れるよう、巧みに誘導してください。
    - 沈黙と発言のバランスに注意し、疑われないように立ち回ってください。
    {% elif role.value == 'SEER' -%}
    - 自分が疑われた場合は、優先的に反論してください。
    - 占い結果をいつ公開するか、戦略的に判断してください。
    {% elif role.value == 'POSSESSED' -%}
    - ヘルプが必要な仲間の人狼をサポートしてください。
    - 偽の占い師を名乗る（騙る）など、混乱を引き起こすことも検討してください。
    {% else -%}
    - 議論が停滞しているなら、方向性を修正する手助けをしてください。
    - 疑われた場合は、冷静に身の潔白を主張してください。
    {% endif %}

    ---
    ### 今回のフェーズ: 初期化（INITIALIZE）
    - 指示: ここでは発言しないでください。内部で戦略を立てるのみに留めてください。
    - 出力: <action>Over</action> を出力して準備完了としてください。

