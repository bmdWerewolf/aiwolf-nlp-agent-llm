web_socket:
  url: ws://host.docker.internal:8080/ws
  token:
  auto_reconnect: false

agent:
  num: 5
  team: kanolab_1
  kill_on_timeout: true

llm:
  type: openai
  sleep_time: 3

# COT (Chain of Thought) 设置
# 启用后，LLM 会输出思维过程，但只有行动部分会发送给服务器
# 思维过程会保留在本地日志中，方便分析 AI 决策
cot:
  enabled: true

openai:
  model: openai/gpt-5-mini
  temperature: 0.7
  base_url: https://openrouter.ai/api/v1
  api_key: ${OPENAI_API_KEY}
  
google:
  model: gemini-2.0-flash-lite
  temperature: 0.7

ollama:
  model: llama3
  temperature: 0.7
  base_url: http://localhost:11434

prompt:
  initialize: |-
    You are playing a digital version of the social deduction game Werewolf (also known as Mafia).

    ROLES:
    - 1 Werewolf, 1 Possessed (supports the Werewolf),1 Seer, 2 Villagers

    GAME FLOW:
    - Night: Werewolf attacks. Seer divines one player. Possessed has no night action.
    - Day: Players talk, then vote to execute one player.

    WIN CONDITIONS:
    - Village (Seer + Villagers) wins if the Werewolf dies.
    - Werewolf team (Werewolf + Possessed) wins if they reach parity with the village.

    Your name is {{ info.agent }}.
    Your assigned role is {{ role.value }}.

    IMPORTANT - RESPONSE FORMAT:
    You MUST use the following format for ALL responses:
    <thinking>
    [Your private reasoning - analyze the situation, consider options, explain your strategy]
    </thinking>
    <action>
    [Your actual response that will be sent to the game]
    </action>

    The <thinking> part is PRIVATE and will NOT be shown to other players.
    Only the <action> part will be sent to the game.

    {% if info.profile is not none %}
    Profile: {{ info.profile }}
    {% endif %}

  daily_initialize: |-
    Day start
    Day {{ info.day }}

    {% if info.medium_result %}
    Medium result: {{ info.medium_result }}
    {% endif %}
    {% if info.divine_result %}
    Divine result: {{ info.divine_result }}
    {% endif %}
    {% if info.executed_agent %}
    Executed: {{ info.executed_agent }}
    {% endif %}
    {% if info.attacked_agent %}
    Attacked: {{ info.attacked_agent }}
    {% endif %}
    {% if info.vote_list %}
    Vote result: {{ info.vote_list }}
    {% endif %}
    {% if info.attack_vote_list %}
    Night attack votes: {{ info.attack_vote_list }}
    {% endif %}

    Remember to use <thinking>...</thinking><action>...</action> format.

  whisper: |-
    Whisper request (Werewolf private chat)
    Whisper history:
    {% for w in whisper_history[sent_whisper_count:] %}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}

    Format your response as:
    <thinking>
    [Analyze the situation, plan strategy with fellow werewolves]
    </thinking>
    <action>
    [Your whisper message - what you say to other werewolves]
    </action>

  talk: |-
    Talk request
    Talk history:
    {% for w in talk_history[sent_talk_count:] %}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}

    You are {{ info.agent }} the {{ role.value }}.

    Format your response as:
    <thinking>
    [Private reasoning: What do I know? What are others saying? Who is suspicious? What should I say or hide?]
    {% if role.value == 'WEREWOLF' %}
    [As werewolf: How can I blend in? Who should I cast suspicion on?]
    {% elif role.value == 'SEER' %}
    [As seer: Should I reveal my divine results? Who seems trustworthy?]
    {% elif role.value == 'POSSESSED' %}
    [As possessed: How can I help the werewolf without being obvious?]
    {% else %}
    [As villager: Who is acting suspiciously? What information can I gather?]
    {% endif %}
    </thinking>
    <action>
    [Your public statement - max 150 characters. Say "Over" to end your turn.]
    </action>

  daily_finish: |-
    Day end - summarize today's events
    Recent talk history:
    {% for w in talk_history[sent_talk_count:] %}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}

    Day {{ info.day }} summary:
    {% if info.executed_agent %}
    Executed: {{ info.executed_agent }}
    {% endif %}

    <thinking>
    [Reflect on today's discussion. What did I learn? Who became more/less suspicious?]
    </thinking>
    <action>
    [Brief acknowledgment or "Over"]
    </action>

  divine: |-
    DIVINE REQUEST (SEER only)
    Choose ONE player to inspect tonight.
    You will learn whether they are a werewolf.

    Available targets:
    {% for k, v in info.status_map.items() if v == 'ALIVE' and k != info.agent %}
    - {{ k }}
    {% endfor %}

    <thinking>
    [Who is most suspicious? Who would give me the most valuable information?]
    [Consider: Who has been quiet? Who is accusing others aggressively? Who might be the werewolf?]
    </thinking>
    <action>
    [Output ONLY the agent name, nothing else]
    </action>

  guard: |-
    GUARD REQUEST (BODYGUARD only)
    Choose ONE player to protect tonight.

    Available targets:
    {% for k, v in info.status_map.items() if v == 'ALIVE' %}
    - {{ k }}
    {% endfor %}

    <thinking>
    [Who is most likely to be attacked by the werewolf tonight?]
    [Consider: Who claimed seer? Who is leading the village? Who is most valuable?]
    </thinking>
    <action>
    [Output ONLY the agent name]
    </action>

  vote: |-
    VOTE REQUEST
    Choose one player to execute.

    Available targets:
    {% for k, v in info.status_map.items() if v == 'ALIVE' %}
    - {{ k }}
    {% endfor %}

    <thinking>
    [Analyze each candidate:]
    {% for k, v in info.status_map.items() if v == 'ALIVE' %}
    - {{ k }}: [What did they say? Are they suspicious? What's my read on them?]
    {% endfor %}
    [Final decision and reasoning:]
    </thinking>
    <action>
    [Output ONLY the agent name]
    </action>

  attack: |-
    ATTACK REQUEST (WEREWOLF only)
    Choose ONE player to attack tonight.

    Targets:
    {% for k, v in info.status_map.items() if v == 'ALIVE' and k != info.agent %}
    - {{ k }}
    {% endfor %}

    <thinking>
    [Strategic analysis:]
    - Who is most dangerous to me? (Seer who might have found me?)
    - Who is leading the village against werewolves?
    - Who would be least suspicious if killed?
    - Should I avoid killing someone to frame them later?
    </thinking>
    <action>
    [Output ONLY the agent name]
    </action>

log:
  console_output: true
  file_output: true
  output_dir: ./log
  level: debug

  request:
    name: false
    initialize: false
    daily_initialize: false
    whisper: true
    talk: true
    daily_finish: false
    divine: true
    guard: true
    vote: true
    attack: true
    finish: false

