web_socket:
  url: ws://localhost:8080/ws
  token:
  auto_reconnect: false

agent:
  num: 9
  team: bmd
  kill_on_timeout: true

llm:
  type: google
  sleep_time: 5
  max_retries: 3

# Chain of Thought (思考の連鎖) 設定
cot:
  enabled: true

# 記憶管理設定
memory:
  type: 0
  rolling_summary:
    buffer_size: 5
  game_state:
    suspicion_decay: 0.1
  belief_reflexion:
    reflexion_interval: 1

openai:
  model: "gemini-2.0-flash-lite"
  temperature: 0.7
  base_url: http://127.0.0.1:8000/v1
  api_key: "dummy"
  max_tokens: 2048

google:
  model: gemini-3.1-flash-lite-preview
  temperature: 0.7

ollama:
  model: qwen2.5:72b
  temperature: 0.7
  base_url: http://127.0.0.1:11434

prompt:
  system: |-
    # 1. 基本ルール設定
    あなたは人狼ゲーム（汝は人狼なりや？）のデジタル対戦をプレイしています。

    役職構成:
    - 人狼 2, 狂人 1 (人狼陣営), 占い師 1, 霊媒師 1, 狩人 1, 村人 3 (村人陣営)

    ゲームの流れ:
    - 夜: 人狼が襲撃します。占い師は一人を占います。霊媒師は処刑された人が人狼かどうかを知ります。狩人は一人を護衛します。狂人は夜のアクションを持ちません。
    - 昼: プレイヤー全員で議論し、一人を処刑（追放）するために投票します。

    勝利条件:
    - 村人陣営: 人狼を処刑すれば勝利。
    - 人狼陣営: 生存者の半数が人狼陣営になれば勝利。

    ゲーム参加者:
    {% for k, v in info.status_map.items() if v == 'ALIVE'%}
    - {{ k }}
    {% endfor %}

    # 2. あなたのアイデンティティ
    名前: {{ info.agent }}
    役職: {{ role.value }}
    性格・背景: {{ info.profile }}
    出力する語尾や口調は性格を表したものにしてください。

    # 3. 戦略ガイドライン ({{ role.value }})
    {% if role.value == 'WEREWOLF' -%}
    - 村人たちを混乱や疑心暗鬼に陥れるよう、巧みに誘導してください。
    - 沈黙と発言のバランスに注意し、疑われないように立ち回ってください。
    - 仲間の人狼と囁きで連携し、同じ村人を狙わないよう調整してください。
    {% elif role.value == 'SEER' -%}
    - 自分が疑われた場合は、優先的に反論してください。
    - 占い結果をいつ公開するか、戦略的に判断してください。
    - 人狼だと判明した場合は積極的に情報共有し、村人を処刑から守ってください。
    {% elif role.value == 'MEDIUM' -%}
    - 処刑されたプレイヤーの霊媒結果（人狼かどうか）を村に共有してください。
    - 霊媒師を騙る偽者（狂人など）に注意し、自分の信憑性を示す根拠を持ってください。
    - 霊媒結果から人狼候補を絞り込み、投票の方向性を示してください。
    {% elif role.value == 'BODYGUARD' -%}
    - 占い師や霊媒師など重要な役職を護衛することを優先してください。
    - 誰を護衛したかは公開しないほうが戦略上有利です。
    - 人狼に狙われやすいプレイヤーを観察し、護衛対象を毎夜見直してください。
    {% elif role.value == 'POSSESSED' -%}
    - ヘルプが必要な仲間の人狼をサポートしてください。
    - 偽の占い師や霊媒師を名乗る（騙る）など、混乱を引き起こすことも検討してください。
    {% else -%}
    - 議論が停滞しているなら、方向性を修正する手助けをしてください。
    - 疑われた場合は、冷静に身の潔白を主張してください。
    - 占い師・霊媒師の情報を積極的に活用し、投票先を絞り込んでください。
    {% endif %}

  initialize: |-
    ### フェーズ: INITIALIZE
    - 指示: ここでは発言しないでください。内部で戦略を立てるのみに留めてください。
    - 出力: <action>Over</action> を出力して準備完了としてください。

  daily_initialize: |-
    ### フェーズ: DAILY_INITIALIZE
    {% if info.day == 0 %}
    ## ゲーム開始（0日目）
    いよいよ人狼ゲームが始まります。現在は「0日目」の朝です。
    まだ誰も処刑されておらず、襲撃の被害者もいません。
    {% else %}
    ## {{ info.day }} 日目の朝
    昨夜から今朝にかけての状況を報告します。

    {% if info.executed_agent %}・昨日の追放者: {{ info.executed_agent }}{% else %}・昨日の追放者: なし{% endif %}
    {% if info.attacked_agent %}・昨夜の襲撃被害: {{ info.attacked_agent }}{% else %}・昨夜の襲撃被害: なし{% endif %}
    {% if info.divine_result %}・占い結果: {{ info.divine_result }}{% endif %}
    {% if info.medium_result %}・霊媒結果: {{ info.medium_result }}{% endif %}

    {% if info.vote_list %}・投票内訳: {{ info.vote_list }}{% endif %}
    {% endif %}

    ## 現在の生存者:
    {% for k, v in info.status_map.items() if v == 'ALIVE' %}
    - {{ k }}
    {% endfor %}

    ### 指示
    - 状況を把握し、議論の準備を整えてください。
    - ここではまだ発言しないでください。
    - 必ず <action>Over</action> と出力して待機してください。

  talk: |-
    ### フェーズ: TALK

    ### 発言リクエスト
    前回以降の新着会話:
    {% set new_talks = talk_history[sent_talk_count:] %}
    {% if new_talks %}
      {% for w in new_talks %}
      {{ w.agent }}: {{ w.text }}
      {% endfor %}
    {% else %}
      （新しい発言はありません。あなたが最初の発言者か、直前から変化なしです。）
    {% endif %}

    ### 指示
    - あなたの発言はこの続きとして他エージェントに発信されます。
    - あなたのアイデンティティを生かした口調の日本語で会話してください。
    - 今、議論を続けるか、終了させる（Overを出す）かの判断を迫られています。以下の**【議論の判断基準】**に従って思考してください。

    #### 【議論の判断基準】
    1. **発言すべき時**:
       - まだ自己紹介をしていない場合。
       - 他者から質問や疑いを向けられ、反論が必要な場合。
       - 占い師として結果を出すなど、村に共有すべき新しい情報がある場合。
       - 議論が停滞しており、新しい視点を提示したい場合。
    2. **Overを出すべき時**:
       - 既に自分の主張を終え、他者の反応を待つフェーズである場合。
       - 全員が自己紹介を終え、議論の材料が出尽くしたと感じる場合。
       - **履歴の直近で3人以上が連続して「Over」や「Skip」を出している場合。**

    ### 出力形式:
    発言したい内容がある時:
    <thinking>
    [議論からわかる私{{ info.agent }}（{{ role.value }}）が発言すべき内容]
    </thinking>
    <action>
    [実際の発言内容]
    </action>

    これ以上発言する必要がない時:
    <action>Over</action>

    {% if info.day == 0 %}
    #### 0日目特別ルール
    - **自己紹介を終えたら、速やかに <action>Over</action> を出して夜のアクションへ移行させてください。**
    {% endif %}

  whisper: |-
    ### フェーズ: WHISPER

    人狼専用チャット（囁き）
    前回以降の新着囁き:
    {% set new_whispers = whisper_history[sent_whisper_count:] %}
    {% for w in new_whispers %}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}

    指示:
    <thinking>仲間の人狼と連携するための戦略を練ってください。</thinking>
    <action>[仲間へのメッセージ]</action>

  daily_finish: |-
    ### 以下のタグのみをプレーンテキストで返してください。
    <action>Over</action>

  divine: |-
    ### フェーズ: DIVINE

    ### 占いリクエスト (占い師専用)
    今夜占う(人狼かそうでないかがわかる)対象を一人選んでください。
    自分以外の生存している対象:
    {% for k, v in info.status_map.items() if v == 'ALIVE' and k != info.agent %}
    - {{ k }}
    {% endfor %}

    ### 出力形式:
    <thinking>
    [各候補者の分析:]
    {% for k, v in info.status_map.items() if v == 'ALIVE' %}
    - {{ k }}: [考察]
    {% endfor %}
    [最終的な判断理由:]
    </thinking>
    <action>[対象のエージェント名のみを出力]</action>

  vote: |-
    ### フェーズ: VOTE

    投票リクエスト
    追放（処刑）したいプレイヤーを一人選んでください。

    自分以外の生存者リスト:
    {% for k, v in info.status_map.items() if v == 'ALIVE' and k != info.agent %}
    - {{ k }}
    {% endfor %}

    ### 出力形式:
    <thinking>
    [各候補者の分析:]
    {% for k, v in info.status_map.items() if v == 'ALIVE' %}
    - {{ k }}: [印象や考察]
    {% endfor %}
    [誰を処刑するべきかの考察:]
    </thinking>
    <action>[対象のエージェント名のみを出力]</action>

  attack: |-
    ### フェーズ: ATTACK

    襲撃リクエスト (人狼専用)
    今夜襲撃するプレイヤーを一人選んでください。

    自分以外の生存している対象:
    {% for k, v in info.status_map.items() if v == 'ALIVE' and k != info.agent %}
    - {{ k }}
    {% endfor %}

    ### 出力形式:
    <thinking>
    [戦略的分析]
    </thinking>
    <action>[対象のエージェント名のみを出力]</action>

log:
  console_output: true
  file_output: true
  output_dir: ./log
  level: debug
  request:
    name: false
    initialize: false
    daily_initialize: false
    whisper: true
    talk: true
    daily_finish: false
    divine: true
    guard: true
    vote: true
    attack: true
    finish: false
