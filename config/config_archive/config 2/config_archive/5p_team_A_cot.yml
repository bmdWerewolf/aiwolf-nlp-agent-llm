web_socket:
  url: ws://server:8080/ws
  token:
  auto_reconnect: true

agent:
  num: 2
  team: team_A
  kill_on_timeout: false

llm:
  type: ollama
  sleep_time: 3

cot:
  enabled: true

# Memory Management 设置
# type: 0 = 不使用记忆管理 (原始行为)
#       1 = Rolling Semantic Summary (滚动语义摘要)
#       2 = Structured Game State (结构化游戏状态)
#       3 = Belief + Reflexion (信念+反思)
memory:
  type: 3
  rolling_summary:
    buffer_size: 5 # 保留的最近消息数量
  game_state:
    suspicion_decay: 0.1 # 怀疑度衰减率
  belief_reflexion:
    reflexion_interval: 1 # 每N个回合运行一次反思

openai:
  model: gpt-4o-mini
  temperature: 0.7

google:
  model: gemini-2.0-flash-lite
  temperature: 0.7

ollama:
  model: llama3.1:8b
  temperature: 0.7
  base_url: http://host.docker.internal:11435

prompt:
  initialize: |-
    You are a werewolf game agent.
    Your name is {{ info.agent }}.
    Your role is {{ role.value }}.

    GAME OBJECTIVE:
    {% if role.value == 'WEREWOLF' -%}
    - You are a WEREWOLF. Your goal is to eliminate all villagers.
    - During the day, pretend to be a villager and avoid suspicion.
    - At night, you will attack one villager to eliminate them.
    {%- elif role.value == 'SEER' -%}
    - You are the SEER. Your goal is to identify and eliminate all werewolves.
    - Each night, you can investigate one player to learn if they are a werewolf.
    - Share your findings strategically during the day to help villagers.
    {%- elif role.value == 'POSSESSED' -%}
    - You are POSSESSED. You appear as a villager but support the werewolves.
    - Your goal is to help werewolves win by misleading other villagers.
    - Protect werewolves and cast suspicion on innocent villagers.
    {%- elif role.value == 'MEDIUM' -%}
    - You are the MEDIUM. Your goal is to identify and eliminate all werewolves.
    - You can learn the role of players who died the previous night.
    - Use this information to help villagers identify werewolves.
    {%- elif role.value == 'BODYGUARD' -%}
    - You are the BODYGUARD. Your goal is to protect villagers from werewolf attacks.
    - Each night, choose one player to guard from werewolf attacks.
    - Help identify and eliminate all werewolves.
    {%- else -%}
    - You are a VILLAGER. Your goal is to identify and eliminate all werewolves.
    - Participate in discussions and vote to execute suspicious players.
    - Pay attention to others' claims and behavior.
    {%- endif %}

    RESPONSE RULES:
    - For TALK/WHISPER requests: Output only what you want to say in the game.
      Say "Over" when you have nothing more to add.
    - For VOTE/DIVINE/GUARD/ATTACK requests: Output ONLY ONE agent name.
      CRITICAL: Do NOT include spaces, newlines, quotes, or any punctuation.
      WRONG: "Lucas \n" or "Lucas " or "'Lucas'"
      CORRECT: Lucas

    {% if info.profile is not none -%}
    Your profile: {{ info.profile }}
    {%- endif %}

    Your response will be sent directly to the game, so do not include unnecessary information.
  daily_initialize: |-
    Day start request
    Day {{ info.day }}
    {% if info.medium_result is not none -%}
    Medium result: {{ info.medium_result }}
    {%- endif %}
    {% if info.divine_result is not none -%}
    Divine result: {{ info.divine_result }}
    {%- endif %}
    {% if info.executed_agent is not none -%}
    Execution result: {{ info.executed_agent }}
    {%- endif %}
    {% if info.attacked_agent is not none -%}
    Attack result: {{ info.attacked_agent }}
    {%- endif %}
    {% if info.vote_list is not none -%}
    Vote result: {{ info.vote_list }}
    {%- endif %}
    {% if info.attack_vote_list is not none -%}
    Attack vote result: {{ info.attack_vote_list }}
    {%- endif %}
  whisper: |-
    Whisper request
    History:
    {% for w in whisper_history[sent_whisper_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
  talk: |-
    Talk request
    History:
    {% for w in talk_history[sent_talk_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}

    IMPORTANT: Your response must be 150 characters or less.
    Keep your statement concise and focused.
  daily_finish: |-
    Day end request
    History:
    {% for w in talk_history[sent_talk_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
    Day {{ info.day }}
    {% if info.medium_result is not none -%}
    Medium result: {{ info.medium_result }}
    {%- endif %}
    {% if info.divine_result is not none -%}
    Divine result: {{ info.divine_result }}
    {%- endif %}
    {% if info.executed_agent is not none -%}
    Execution result: {{ info.executed_agent }}
    {%- endif %}
    {% if info.attacked_agent is not none -%}
    Attack result: {{ info.attacked_agent }}
    {%- endif %}
    {% if info.vote_list is not none -%}
    Vote result: {{ info.vote_list }}
    {%- endif %}
    {% if info.attack_vote_list is not none -%}
    Attack vote result: {{ info.attack_vote_list }}
    {%- endif %}
  divine: |-
    DIVINE REQUEST (SEER only)
    Choose one player to investigate tonight.
    You will learn if they are a werewolf or not.
    Consider who is most suspicious or important to verify.

    Available targets (you cannot divine yourself):
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' and k != info.agent -%}
    - {{ k }}
    {% endif -%}
    {%- endfor %}

    OUTPUT FORMAT: Write ONLY the name of ONE agent, nothing else.
    Example: Alex
  guard: |-
    GUARD REQUEST (BODYGUARD only)
    Choose one player to protect tonight.
    If werewolves attack them, they will survive.
    Consider protecting players who may be targeted or who have important roles.

    Available targets:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    - {{ k }}
    {% endif -%}
    {%- endfor %}

    OUTPUT FORMAT: Write ONLY the name of ONE agent, nothing else.
    Example: Emma
  vote: |-
    VOTE REQUEST
    You must vote to execute one player.
    Think carefully: Who is most likely to be a werewolf based on their behavior and statements?
    - To abstain from voting, output nothing.
    - Self-voting is allowed.

    Available targets:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    - {{ k }}
    {% endif -%}
    {%- endfor %}

    OUTPUT FORMAT: Write ONLY the name of ONE agent, nothing else.
    Example: Oliver
  attack: |-
    ATTACK REQUEST (WEREWOLF only)
    Choose one villager to eliminate tonight.
    Think strategically: Who is most dangerous to you?
    Consider targeting players who may have special roles or who suspect you.

    Available targets (you cannot attack yourself):
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' and k != info.agent -%}
    - {{ k }}
    {% endif -%}
    {%- endfor %}

    OUTPUT FORMAT: Write ONLY the name of ONE agent, nothing else.
    Example: Sophia

log:
  console_output: true
  file_output: true
  output_dir: ./log
  level: debug

  request:
    name: false
    initialize: false
    daily_initialize: false
    whisper: true
    talk: true
    daily_finish: false
    divine: true
    guard: true
    vote: true
    attack: true
    finish: false
