web_socket:
  url: ws://server:8080/ws
  token:
  auto_reconnect: true

agent:
  num: 2
  team: team_A
  kill_on_timeout: false

llm:
  type: ollama
  sleep_time: 3

openai:
  model: gpt-4o-mini
  temperature: 0.7

google:
  model: gemini-2.0-flash-lite
  temperature: 0.7

ollama:
  model: llama3.1:8b
  temperature: 0.7
  base_url: http://host.docker.internal:11435

prompt:
  initialize: |-
    You are a werewolf game agent.
    Your name is {{ info.agent }}.
    Your role is {{ role.value }}.

    CRITICAL RULES:
    1. For VOTE, DIVINE, GUARD, and ATTACK requests: Output ONLY the target agent's name. Nothing else. No explanations, no punctuation, no extra words.
    2. For TALK and WHISPER requests: Output only the content to be spoken in the game.
    3. When you want to end your talk, output only "Over".

    EXAMPLES:
    - VOTE request → Output: "Asuka" (NOT "I vote for Asuka" or anything else)
    - DIVINE request → Output: "George" (NOT "Execute" or "I divine George")
    - ATTACK request → Output: "Victoria" (NOT "(I attack) Victoria")
    - TALK request → Output: "I think we should vote for the werewolf."

    {% if info.profile is not none -%}
    Your profile: {{ info.profile }}
    {%- endif %}

    Your response will be sent directly to the game server. Follow the format rules exactly.
  daily_initialize: |-
    Day start request
    Day {{ info.day }}
    {% if info.medium_result is not none -%}
    Medium result: {{ info.medium_result }}
    {%- endif %}
    {% if info.divine_result is not none -%}
    Divine result: {{ info.divine_result }}
    {%- endif %}
    {% if info.executed_agent is not none -%}
    Execution result: {{ info.executed_agent }}
    {%- endif %}
    {% if info.attacked_agent is not none -%}
    Attack result: {{ info.attacked_agent }}
    {%- endif %}
    {% if info.vote_list is not none -%}
    Vote result: {{ info.vote_list }}
    {%- endif %}
    {% if info.attack_vote_list is not none -%}
    Attack vote result: {{ info.attack_vote_list }}
    {%- endif %}
  whisper: |-
    Whisper request
    History:
    {% for w in whisper_history[sent_whisper_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
  talk: |-
    Talk request
    History:
    {% for w in talk_history[sent_talk_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
  daily_finish: |-
    Day end request
    History:
    {% for w in talk_history[sent_talk_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
    Day {{ info.day }}
    {% if info.medium_result is not none -%}
    Medium result: {{ info.medium_result }}
    {%- endif %}
    {% if info.divine_result is not none -%}
    Divine result: {{ info.divine_result }}
    {%- endif %}
    {% if info.executed_agent is not none -%}
    Execution result: {{ info.executed_agent }}
    {%- endif %}
    {% if info.attacked_agent is not none -%}
    Attack result: {{ info.attacked_agent }}
    {%- endif %}
    {% if info.vote_list is not none -%}
    Vote result: {{ info.vote_list }}
    {%- endif %}
    {% if info.attack_vote_list is not none -%}
    Attack vote result: {{ info.attack_vote_list }}
    {%- endif %}
  divine: |-
    Divine request
    Targets:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
  guard: |-
    Guard request
    Targets:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
  vote: |-
    Vote request
    Targets:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
  attack: |-
    Attack request
    Targets:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}

log:
  console_output: true
  file_output: true
  output_dir: ./log
  level: debug

  request:
    name: false
    initialize: false
    daily_initialize: false
    whisper: true
    talk: true
    daily_finish: false
    divine: true
    guard: true
    vote: true
    attack: true
    finish: false
