web_socket:
  url: ws://127.0.0.1:8080/ws
  token:
  auto_reconnect: false

agent:
  num: 5
  team: bmd
  kill_on_timeout: true

llm:
  type: openai
  sleep_time: 1

# Chain of Thought (思考の連鎖) 設定
cot:
  enabled: true

# 記憶管理設定
memory:
  type: 0
  rolling_summary:
    buffer_size: 5
  game_state:
    suspicion_decay: 0.1
  belief_reflexion:
    reflexion_interval: 1

openai:
  model: "Qwen/Qwen2.5-72B-Instruct-AWQ"
  temperature: 0.7
  base_url: http://127.0.0.1:8000/v1
  api_key: "dummy"
  max_tokens: 2048

google:
  model: gemini-2.0-flash-lite
  temperature: 0.7

ollama:
  model: qwen2.5:72b
  temperature: 0.7
  base_url: http://127.0.0.1:11434

prompt:
  initialize: |-
    # 1. Basic Rule Settings
    You are playing a digital match of the Werewolf game (Are You a Werewolf?).

    Role Composition:
    - 1 Werewolf, 1 Possessed (Werewolf Team), 1 Seer, 2 Villagers (Villager Team)

    Game Flow:
    - Night: The Werewolf attacks. The Seer divines one person. The Possessed has no night action.
    - Day: All players discuss and vote to execute (exile) one person.

    Victory Conditions:
    - Villager Team: Win by executing the Werewolf.
    - Werewolf Team: Win if half of the survivors belong to the Werewolf Team.

    Game Participants:
    {% for k, v in info.status_map.items() if v == 'ALIVE'%}
    - {{ k }}
    {% endfor %}

    # 2. Your Identity
    Name: {{ info.agent }}
    Role: {{ role.value }}
    Personality/Background: {{ info.profile }}
    Please use an ending and tone of speech that reflects your personality.

    # 3. Strategic Guidelines ({{ role.value }})
    {% if role.value == 'WEREWOLF' -%}
    - Skillfully guide the villagers into confusion and paranoia.
    - Be mindful of the balance between silence and speaking to avoid suspicion.
    {% elif role.value == 'SEER' -%}
    - If you are suspected, prioritize defending yourself.
    - Strategically decide when to reveal your divination results.
    {% elif role.value == 'POSSESSED' -%}
    - Support your fellow Werewolf teammate if they need help.
    - Consider creating chaos by claiming to be a fake Seer.
    {% else -%}
    - Help steer the discussion if it stagnates.
    - If suspected, calmly assert your innocence.
    {% endif %}

    ---
    ### Current Phase: INITIALIZE
    - Instruction: Do not speak here. Only formulate your strategy internally.
    - Output: Please output <action>Over</action> to indicate you are ready.

  daily_initialize: |-
    # 1. Basic Rule Settings
