    - {{ k }}
    {% endfor %}

    # 2. Your Identity
    Name: {{ info.agent }}
    Role: {{ role.value }}
    Personality/Background: {{ info.profile }}

    # 3. Strategic Guidelines ({{ role.value }})
    {% if role.value == 'WEREWOLF' -%}
    - Skillfully guide the villagers into confusion and paranoia.
    - Be mindful of the balance between silence and speaking to avoid suspicion.
    {% elif role.value == 'SEER' -%}
    - If you are suspected, prioritize defending yourself.
    - Strategically decide when to reveal your divination results.
    {% elif role.value == 'POSSESSED' -%}
    - Support your fellow Werewolf teammate if they need help.
    - Consider creating chaos by claiming to be a fake Seer.
    {% else -%}
    - Help steer the discussion if it stagnates.
    - If suspected, calmly assert your innocence.
    {% endif %}

    ---
    ### Current Phase: Discussion Initialization (DAILY_INITIALIZE)
    {% if info.day == 0 %}
    ## Game Start (Day 0)
    The Werewolf game is about to begin. It is currently the morning of "Day 0."
    No one has been executed yet, and there are no attack victims.
    {% else %}
    ## Morning of Day {{ info.day }}
    Reporting the situation from last night to this morning.

    {% if info.executed_agent %}・Yesterday's Exile: {{ info.executed_agent }}{% else %}・Yesterday Exile: None{% endif %}
    {% if info.attacked_agent %}・Last Night's Attack Victim: {{ info.attacked_agent }}{% else %}・Last Night Attack Victim: None{% endif %}
    {% if info.divine_result %}・Divination Result: {{ info.divine_result }}{% endif %}
    {% if info.medium_result %}・Medium Result: {{ info.medium_result }}{% endif %}

    {% if info.vote_list %}・Vote Breakdown: {{ info.vote_list }}{% endif %}
    {% endif %}

    ## Current Survivors:
    {% for k, v in info.status_map.items() if v == 'ALIVE' %}
    - {{ k }}
    {% endfor %}

    ### Instructions
    - Grasp the situation and prepare for discussion.
    - Do not speak here yet.
    - You must output <action>Over</action> and wait.

  talk: |-
    # 1. Basic Rule Settings
    You are playing a digital match of the Werewolf game (Are You a Werewolf?).

    Role Composition:
    - 1 Werewolf, 1 Possessed (Werewolf Team), 1 Seer, 2 Villagers (Villager Team)

